name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --title "Desktop ${{ github.ref_name }}" --generate-notes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Checkout plugins repo
        uses: actions/checkout@v4
        with:
          repository: kaisersong/kai-xiaok-plugins
          path: kai-xiaok-plugins
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout KSwarm repo
        uses: actions/checkout@v4
        with:
          repository: kaisersong/kswarm
          path: kswarm
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build report-renderer bundle
        run: |
          cd kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer
          npm ci
          npm run build
          npm run build:bundle

      - name: Download Python wheels (macOS)
        run: |
          pip3 download mcp pydantic jsonschema \
            -d kai-xiaok-plugins/plugins/kai-slide-creator/bundled-wheels/ \
            --only-binary=:all:

      - name: Smoke test report-renderer
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' | timeout 5 node kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer/dist/server.bundle.js || true

      - name: Build desktop
        run: cd desktop && npm run build
        env:
          KSWARM_SOURCE_ROOT: ${{ github.workspace }}/kswarm

      - name: Package macOS installer
        run: cd desktop && npx electron-builder --config electron-builder.json --mac --arm64 --publish never

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.dmg desktop/release/*-mac.zip desktop/release/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Checkout plugins repo
        uses: actions/checkout@v4
        with:
          repository: kaisersong/kai-xiaok-plugins
          path: kai-xiaok-plugins
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout KSwarm repo
        uses: actions/checkout@v4
        with:
          repository: kaisersong/kswarm
          path: kswarm
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build report-renderer bundle
        run: |
          cd kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer
          npm ci
          npm run build
          npm run build:bundle

      - name: Download Python wheels (Windows)
        run: |
          pip download mcp pydantic jsonschema -d kai-xiaok-plugins/plugins/kai-slide-creator/bundled-wheels/ --only-binary=:all:

      - name: Build desktop
        run: cd desktop && npm run build
        env:
          KSWARM_SOURCE_ROOT: ${{ github.workspace }}/kswarm

      - name: Package Windows installer
        run: cd desktop && npx electron-builder --config electron-builder.json --win nsis --publish never

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.exe desktop/release/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
