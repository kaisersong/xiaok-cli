name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --title "Desktop ${{ github.ref_name }}" --generate-notes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build desktop
        run: cd desktop && npm run build

      - name: Package DMG + ZIP
        run: cd desktop && npx electron-builder --config electron-builder.json --mac dmg zip --publish never

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.dmg desktop/release/*-mac.zip desktop/release/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build desktop
        run: cd desktop && npm run build

      - name: Package Windows installer
        run: cd desktop && npx electron-builder --config electron-builder.json --win nsis --publish never

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.exe desktop/release/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
