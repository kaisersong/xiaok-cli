name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build desktop
        run: cd desktop && npm run build

      - name: Package & Publish DMG + ZIP
        run: cd desktop && npx electron-builder --config electron-builder.json --mac dmg zip --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build desktop
        run: cd desktop && npm run build

      - name: Package & Publish Windows installer
        run: cd desktop && npx electron-builder --config electron-builder.json --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
