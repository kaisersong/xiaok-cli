name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Draft GitHub Release
        run: gh release create "${{ github.ref_name }}" --title "Desktop ${{ github.ref_name }}" --generate-notes --draft || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Clone desktop sidecar repositories
        run: |
          git clone --depth 1 https://github.com/kaisersong/kai-xiaok-plugins.git ../kai-xiaok-plugins
          git clone --depth 1 https://github.com/kaisersong/kswarm.git ../kswarm
          git clone --depth 1 https://github.com/kaisersong/intent-broker.git ../intent-broker

      - name: Install sidecar dependencies
        run: |
          cd ../kswarm && npm ci --omit=dev
          cd ../intent-broker && npm ci --omit=dev

      - name: Build report-renderer bundle
        run: |
          cd ../kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer
          npm ci
          npm run build
          npm run build:bundle

      - name: Download Python wheels (macOS)
        run: |
          wheel_dir="../kai-xiaok-plugins/plugins/kai-slide-creator/bundled-wheels"
          rm -rf "$wheel_dir"
          mkdir -p "$wheel_dir"
          for py in 311 312 313 314; do
            python3 -m pip download mcp==1.27.1 pydantic==2.13.4 jsonschema==4.26.0 beautifulsoup4 \
              -d "$wheel_dir" \
              --only-binary=:all: \
              --platform macosx_11_0_arm64 \
              --implementation cp \
              --python-version "$py" \
              --abi "cp$py" \
              --abi abi3 \
              --abi none
          done

      - name: Smoke test report-renderer
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' | timeout 5 node ../kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer/dist/server.bundle.js || true

      - name: Build desktop
        run: cd desktop && npm run build
        env:
          KSWARM_SOURCE_ROOT: ${{ github.workspace }}/../kswarm

      - name: Validate macOS signing secrets
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          missing=()
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_TEAM_ID APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} )); then
            printf 'Missing macOS signing secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi
          if [[ "$APPLE_TEAM_ID" != "Y9YR86UG94" ]]; then
            printf 'APPLE_TEAM_ID must be Y9YR86UG94 for com.xiaok.desktop\n' >&2
            exit 1
          fi

      - name: Write Apple notarization API key
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_id = os.environ["APPLE_API_KEY_ID"]
          key_path = Path(os.environ["RUNNER_TEMP"]) / f"AuthKey_{key_id}.p8"
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_P8_BASE64"]))
          key_path.chmod(0o600)
          PY

      - name: Import macOS signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/xiaok-developer-id.p12"
          keychain_path="$RUNNER_TEMP/xiaok-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ["RUNNER_TEMP"]) / "xiaok-developer-id.p12"
          cert_path.write_bytes(base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"]))
          PY
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$keychain_path"

          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS bundled wheel binaries
        run: |
          python3 scripts/sign-macos-wheel-binaries.py \
            ../kai-xiaok-plugins/plugins/kai-slide-creator/bundled-wheels \
            --identity "Developer ID Application: Kai Song (Y9YR86UG94)" \
            --keychain "$MACOS_SIGNING_KEYCHAIN"

      - name: Package signed macOS app
        run: cd desktop && npx electron-builder --config electron-builder.json --mac dir --arm64 --publish never -c.mac.forceCodeSigning=true -c.mac.notarize=false
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize macOS app
        timeout-minutes: 135
        run: scripts/notarize-macos-app.sh desktop/release/mac-arm64/xiaok.app
        env:
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          NOTARY_ARCHIVE_KEY: ${{ github.sha }}
          NOTARY_TIMEOUT_SECONDS: "7200"
          NOTARY_POLL_INTERVAL_SECONDS: "30"
          NOTARY_REUSE_IN_PROGRESS: "true"
          NOTARY_REUSE_WINDOW_SECONDS: "7200"

      - name: Package macOS distributables
        run: cd desktop && npx electron-builder --config electron-builder.json --mac dmg zip --arm64 --publish never --prepackaged release/mac-arm64/xiaok.app -c.mac.notarize=false
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify macOS signature and notarization
        shell: bash
        run: |
          app_path="desktop/release/mac-arm64/xiaok.app"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | tee "$RUNNER_TEMP/xiaok-codesign.txt"
          grep "TeamIdentifier=Y9YR86UG94" "$RUNNER_TEMP/xiaok-codesign.txt"
          xcrun stapler validate "$app_path"

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.dmg desktop/release/*-mac.zip desktop/release/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Clone desktop sidecar repositories
        run: |
          git clone --depth 1 https://github.com/kaisersong/kai-xiaok-plugins.git ../kai-xiaok-plugins
          git clone --depth 1 https://github.com/kaisersong/kswarm.git ../kswarm
          git clone --depth 1 https://github.com/kaisersong/intent-broker.git ../intent-broker

      - name: Install sidecar dependencies
        run: |
          cd ../kswarm && npm ci --omit=dev
          cd ../intent-broker && npm ci --omit=dev

      - name: Build report-renderer bundle
        run: |
          cd ../kai-xiaok-plugins/plugins/kai-report-creator/mcp-servers/report-renderer
          npm ci
          npm run build
          npm run build:bundle

      - name: Download Python wheels (Windows)
        run: |
          $wheelDir = Join-Path (Resolve-Path ..\kai-xiaok-plugins\plugins\kai-slide-creator).Path 'bundled-wheels'
          Remove-Item -LiteralPath $wheelDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $wheelDir | Out-Null
          foreach ($py in @('311', '312', '313', '314')) {
            python -m pip download mcp==1.27.1 pydantic==2.13.4 jsonschema==4.26.0 beautifulsoup4 `
              -d $wheelDir `
              --only-binary=:all: `
              --platform win_amd64 `
              --implementation cp `
              --python-version $py `
              --abi "cp$py" `
              --abi abi3 `
              --abi none
          }

      - name: Build desktop
        run: cd desktop && npm run build
        env:
          KSWARM_SOURCE_ROOT: ${{ github.workspace }}/../kswarm

      - name: Package Windows installer
        run: cd desktop && npx electron-builder --config electron-builder.json --win nsis --publish never

      - name: Upload to GitHub Release
        run: gh release upload "${{ github.ref_name }}" desktop/release/*.exe desktop/release/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify draft desktop updater release assets
        run: node scripts/verify-desktop-release.mjs "${{ github.ref_name }}" --prepublish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release as latest
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published desktop updater release assets
        run: node scripts/verify-desktop-release.mjs "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
