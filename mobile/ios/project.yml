name: XiaokMobile
options:
  bundleIdPrefix: com.xiaok
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  XiaokMobile:
    type: application
    platform: iOS
    sources:
      - path: XiaokMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiaok.mobile
        INFOPLIST_FILE: XiaokMobile/Info.plist
        GENERATE_INFOPLIST_FILE: NO
  XiaokMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: XiaokMobileTests
    dependencies:
      - target: XiaokMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiaok.mobile.tests
        GENERATE_INFOPLIST_FILE: YES
  XiaokMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: XiaokMobileUITests
    dependencies:
      - target: XiaokMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiaok.mobile.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  XiaokMobile:
    build:
      targets:
        XiaokMobile: all
    test:
      gatherCoverageData: true
      targets:
        - name: XiaokMobileTests
        - name: XiaokMobileUITests
